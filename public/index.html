<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Chat App</title>
		<style>
			:root {
				--primary-color: #76b900;
				--primary-dark: #5a8e00;
				--primary-light: #9ed321;
				--secondary-color: #1a1a1a;
				--tertiary-color: #76b900;
				--light-bg: #0d0d0d;
				--card-bg: #1a1a1a;
				--border-color: #333333;
				--text-color: #ffffff;
				--text-light: #b0b0b0;
				--user-msg-bg: #2d5016;
				--assistant-msg-bg: #1f1f1f;
				--accent-green: #76b900;
				--hover-green: #9ed321;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				background-color: var(--light-bg);
				max-width: 1000px;
				margin: 0 auto;
				padding: 1rem;
			}

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1.5rem 0;
				border-bottom: 2px solid var(--accent-green);
				background: linear-gradient(135deg, rgba(118, 185, 0, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
				border-radius: 8px;
			}

			h1 {
				font-size: 2rem;
				color: var(--accent-green);
				font-weight: 700;
				letter-spacing: 0.5px;
			}

			header p {
				color: var(--text-light);
				margin-top: 0.5rem;
				font-size: 0.95rem;
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 250px);
				min-height: 500px;
				border: 1px solid var(--border-color);
				border-radius: 12px;
				overflow: hidden;
				background-color: var(--card-bg);
				box-shadow: 0 8px 32px rgba(118, 185, 0, 0.1);
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1.5rem;
				background-color: var(--light-bg);
				display: flex;
				flex-direction: column;
				gap: 1rem;
			}

			.message {
				display: flex;
				margin-bottom: 0.5rem;
				animation: slideIn 0.3s ease-out;
			}

			@keyframes slideIn {
				from {
					opacity: 0;
					transform: translateY(10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.message-content {
				padding: 1rem;
				border-radius: 12px;
				max-width: 70%;
				word-wrap: break-word;
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
				line-height: 1.5;
			}

			.user-message {
				justify-content: flex-end;
			}

			.user-message .message-content {
				background-color: var(--user-msg-bg);
				border: 1px solid var(--accent-green);
				color: #ffffff;
			}

			.assistant-message {
				justify-content: flex-start;
			}

			.assistant-message .message-content {
				background-color: var(--assistant-msg-bg);
				border: 1px solid var(--border-color);
				color: var(--text-color);
			}

			.message-attachment {
				display: flex;
				gap: 0.5rem;
				flex-wrap: wrap;
				margin-top: 0.5rem;
			}

			.attachment-item {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				background-color: rgba(118, 185, 0, 0.15);
				padding: 0.5rem 0.75rem;
				border-radius: 6px;
				border: 1px solid var(--accent-green);
				font-size: 0.85rem;
				color: var(--accent-green);
			}

			.attachment-icon {
				width: 16px;
				height: 16px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.preview-image {
				max-width: 300px;
				border-radius: 8px;
				margin-top: 0.5rem;
				border: 1px solid var(--border-color);
			}

			.message-input-section {
				border-top: 1px solid var(--border-color);
				background-color: var(--card-bg);
				padding: 1rem;
			}

			.file-preview {
				display: flex;
				gap: 0.75rem;
				flex-wrap: wrap;
				margin-bottom: 0.75rem;
				max-height: 120px;
				overflow-y: auto;
			}

			.preview-item {
				position: relative;
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				background-color: var(--light-bg);
				border: 1px solid var(--border-color);
				padding: 0.5rem 0.75rem;
				border-radius: 6px;
				font-size: 0.85rem;
				color: var(--text-light);
			}

			.preview-item img {
				max-width: 60px;
				max-height: 60px;
				border-radius: 4px;
			}

			.remove-file {
				cursor: pointer;
				color: #ff6b6b;
				margin-left: 0.5rem;
				font-weight: bold;
				transition: color 0.2s;
			}

			.remove-file:hover {
				color: #ff8787;
			}

			.message-controls {
				display: flex;
				gap: 0.5rem;
				margin-bottom: 0.75rem;
				flex-wrap: wrap;
			}

			.control-button {
				position: relative;
				padding: 0.6rem 0.8rem;
				background-color: var(--secondary-color);
				border: 1px solid var(--border-color);
				color: var(--accent-green);
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.2s;
				font-size: 0.9rem;
				display: flex;
				align-items: center;
				gap: 0.4rem;
				font-family: inherit;
			}

			.control-button:hover {
				background-color: rgba(118, 185, 0, 0.15);
				border-color: var(--accent-green);
				transform: translateY(-2px);
			}

			.control-button:active {
				transform: translateY(0px);
			}

			.hidden-file-input {
				display: none;
			}

			.message-input {
				display: flex;
				gap: 0.75rem;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				font-family: inherit;
				resize: none;
				min-height: 44px;
				max-height: 120px;
				background-color: var(--light-bg);
				color: var(--text-color);
				font-size: 0.95rem;
				transition: border-color 0.2s;
			}

			#user-input:focus {
				outline: none;
				border-color: var(--accent-green);
				box-shadow: 0 0 0 2px rgba(118, 185, 0, 0.2);
			}

			#user-input::placeholder {
				color: var(--text-light);
			}

			#send-button {
				padding: 0.75rem 1.5rem;
				background: linear-gradient(135deg, var(--accent-green) 0%, var(--primary-dark) 100%);
				color: #000000;
				border: none;
				border-radius: 8px;
				cursor: pointer;
				transition: all 0.2s;
				font-weight: 600;
				display: flex;
				align-items: center;
				gap: 0.5rem;
				white-space: nowrap;
				min-width: 100px;
				justify-content: center;
				font-family: inherit;
			}

			#send-button:hover:not(:disabled) {
				background: linear-gradient(135deg, var(--hover-green) 0%, var(--accent-green) 100%);
				transform: translateY(-2px);
				box-shadow: 0 4px 16px rgba(118, 185, 0, 0.3);
			}

			#send-button:disabled {
				background: linear-gradient(135deg, var(--text-light) 0%, #666666 100%);
				cursor: not-allowed;
				opacity: 0.6;
			}

			.typing-indicator {
				display: none;
				padding: 1rem;
				color: var(--text-light);
				font-style: italic;
				font-size: 0.95rem;
			}

			.typing-indicator.visible {
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}

			.typing-dots {
				display: flex;
				gap: 3px;
			}

			.typing-dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background-color: var(--accent-green);
				animation: typing 1.4s infinite;
			}

			.typing-dot:nth-child(2) {
				animation-delay: 0.2s;
			}

			.typing-dot:nth-child(3) {
				animation-delay: 0.4s;
			}

			@keyframes typing {
				0%, 60%, 100% {
					opacity: 0.3;
				}
				30% {
					opacity: 1;
				}
			}

			footer {
				margin-top: 1.5rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
				padding: 1rem;
				border-top: 1px solid var(--border-color);
			}

			/* Scrollbar styling */
			.chat-messages::-webkit-scrollbar {
				width: 8px;
			}

			.chat-messages::-webkit-scrollbar-track {
				background: var(--light-bg);
			}

			.chat-messages::-webkit-scrollbar-thumb {
				background: var(--accent-green);
				border-radius: 4px;
			}

			.chat-messages::-webkit-scrollbar-thumb:hover {
				background: var(--hover-green);
			}
		</style>
	</head>
	<body>
		<header>
			<h1>🚀 NVIDIA AI Chat</h1>
			<p>Powered by Cloudflare Workers AI</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<div class="message-content">
						<p>
							Welcome to NVIDIA AI Chat! I'm powered by Cloudflare Workers AI. 
							You can now attach files and images to enhance our conversation. How can I assist you?
						</p>
					</div>
				</div>
			</div>

			<div class="typing-indicator" id="typing-indicator">
				<span>AI is thinking</span>
				<div class="typing-dots">
					<div class="typing-dot"></div>
					<div class="typing-dot"></div>
					<div class="typing-dot"></div>
				</div>
			</div>

			<div class="message-input-section">
				<div class="file-preview" id="file-preview"></div>
				
				<div class="message-controls">
					<button type="button" class="control-button" id="file-button">
						📎 Attach File
					</button>
					<button type="button" class="control-button" id="image-button">
						🖼️ Add Image
					</button>
				</div>

				<div class="message-input">
					<textarea
						id="user-input"
						placeholder="Type your message here... (Shift+Enter for new line, Enter to send)"
						rows="1"
						autofocus
					></textarea>
					<button type="button" id="send-button">Send</button>
				</div>
			</div>
		</div>

		<footer>
			<p>NVIDIA AI Chat Template &copy; 2025 | Powered by Cloudflare Workers AI</p>
		</footer>

		<!-- Hidden file inputs -->
		<input type="file" id="file-input" class="hidden-file-input" accept=".txt,.pdf,.doc,.docx,.json,.csv" />
		<input type="file" id="image-input" class="hidden-file-input" accept="image/*" multiple />

		<!-- Chat app script -->
		<script src="chat.js"></script>
		<script>
			// File and image handling
			const fileButton = document.getElementById('file-button');
			const imageButton = document.getElementById('image-button');
			const fileInput = document.getElementById('file-input');
			const imageInput = document.getElementById('image-input');
			const filePreview = document.getElementById('file-preview');
			let attachedFiles = [];

			// Add event listeners
			fileButton.addEventListener('click', function(e) {
				e.preventDefault();
				fileInput.click();
			});

			imageButton.addEventListener('click', function(e) {
				e.preventDefault();
				imageInput.click();
			});

			fileInput.addEventListener('change', (e) => {
				Array.from(e.target.files).forEach(file => {
					addAttachment(file, 'file');
				});
				fileInput.value = '';
			});

			imageInput.addEventListener('change', (e) => {
				Array.from(e.target.files).forEach(file => {
					addAttachment(file, 'image');
				});
				imageInput.value = '';
			});

			function addAttachment(file, type) {
				const attachment = { file, type, id: Date.now() + Math.random() };
				attachedFiles.push(attachment);
				renderPreview();
			}

			function renderPreview() {
				filePreview.innerHTML = attachedFiles.map(att => {
					const isImage = att.type === 'image';
					if (isImage) {
						const url = URL.createObjectURL(att.file);
						return `
							<div class="preview-item">
								<img src="${url}" alt="${att.file.name}" />
								<span>${att.file.name}</span>
								<span class="remove-file" onclick="removeAttachment(${att.id})">✕</span>
							</div>
						`;
					} else {
						return `
							<div class="preview-item">
								<span>📄 ${att.file.name}</span>
								<span class="remove-file" onclick="removeAttachment(${att.id})">✕</span>
							</div>
						`;
					}
				}).join('');
			}

			function removeAttachment(id) {
				attachedFiles = attachedFiles.filter(att => att.id !== id);
				renderPreview();
			}

			// Store attachments globally for use in chat.js
			window.attachedFiles = attachedFiles;
			
			// Auto-resize textarea
			const userInput = document.getElementById('user-input');
			userInput.addEventListener('input', function() {
				this.style.height = 'auto';
				this.style.height = Math.min(this.scrollHeight, 120) + 'px';
			});

			// Handle Shift+Enter for new line, Enter to send
			userInput.addEventListener('keydown', function(e) {
				if (e.key === 'Enter' && !e.shiftKey) {
					e.preventDefault();
					document.getElementById('send-button').click();
				}
			});
		</script>
	</body>
</html>
